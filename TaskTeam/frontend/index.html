<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTeam - Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 450px;
        }
        
        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .auth-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .auth-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .auth-body {
            padding: 40px 30px;
        }
        
        .form-tabs {
            display: flex;
            margin-bottom: 30px;
            background: #f5f7fa;
            border-radius: 8px;
            padding: 4px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            color: #a0aec0;
            font-size: 14px;
            transition: all 0.3s;
            border-radius: 6px;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .form-container {
            display: none;
        }
        
        .form-container.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }
        
        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }
        
        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #718096;
        }
        
        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid #e2e8f0;
        }
        
        .feature {
            text-align: center;
        }
        
        .feature-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .feature-title {
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
        }
        
        .feature-desc {
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>📊 TaskTeam</h1>
                <p>Система управления проектами и задачами для команд</p>
            </div>
            
            <div class="auth-body">
                <div class="form-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Вход</button>
                    <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
                </div>
                
                <!-- Login Form -->
                <div id="login" class="form-container active">
                    <div id="loginAlert" class="alert"></div>
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>Имя пользователя</label>
                            <input type="text" id="loginUsername" required placeholder="Введите ваше имя">
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" id="loginPassword" required placeholder="Введите пароль">
                        </div>
                        <button type="submit" class="btn btn-primary" id="loginBtn">Войти</button>
                        <div class="form-footer">
                            Нет аккаунта? <a onclick="switchTab('register')">Создать</a>
                        </div>
                    </form>
                </div>
                
                <!-- Register Form -->
                <div id="register" class="form-container">
                    <div id="registerAlert" class="alert"></div>
                    <form onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label>Имя пользователя</label>
                            <input type="text" id="registerUsername" required placeholder="Выберите имя пользователя">
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" id="registerPassword" required placeholder="Минимум 6 символов">
                        </div>
                        <div class="form-group">
                            <label>Подтвердите пароль</label>
                            <input type="password" id="registerConfirmPassword" required placeholder="Повторите пароль">
                        </div>
                        <button type="submit" class="btn btn-primary" id="registerBtn">Регистрация</button>
                        <div class="form-footer">
                            Уже есть аккаунт? <a onclick="switchTab('login')">Войти</a>
                        </div>
                    </form>
                </div>
                
                <!-- Features -->
                <div class="features">
                    <div class="feature">
                        <div class="feature-icon">👥</div>
                        <div class="feature-title">Команды</div>
                        <div class="feature-desc">Управление составом и ролями</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">📁</div>
                        <div class="feature-title">Проекты</div>
                        <div class="feature-desc">Организация работ</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">✓</div>
                        <div class="feature-title">Задачи</div>
                        <div class="feature-desc">Отслеживание прогресса</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">📊</div>
                        <div class="feature-title">Аналитика</div>
                        <div class="feature-desc">Статистика и отчеты</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8080/api';
        
        function switchTab(tab) {
            // Hide all forms
            document.querySelectorAll('.form-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Show selected form
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const alert = document.getElementById('loginAlert');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Загрузка...';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', data.username);
                    
                    alert.classList.remove('alert-error');
                    alert.classList.add('alert-success', 'show');
                    alert.textContent = '✓ Успешный вход! Перенаправление...';
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    const error = await response.json();
                    showAlert('loginAlert', error.detail || 'Ошибка входа', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('loginAlert', 'Ошибка подключения к серверу', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Войти';
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const btn = document.getElementById('registerBtn');
            const alert = document.getElementById('registerAlert');
            
            if (password !== confirmPassword) {
                showAlert('registerAlert', 'Пароли не совпадают', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('registerAlert', 'Пароль должен содержать минимум 6 символов', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Загрузка...';
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        confirm_password: confirmPassword
                    })
                });
                
                if (response.ok) {
                    alert.classList.remove('alert-error');
                    alert.classList.add('alert-success', 'show');
                    alert.textContent = '✓ Регистрация успешна! Перенаправление на вход...';
                    
                    setTimeout(() => {
                        document.getElementById('registerUsername').value = '';
                        document.getElementById('registerPassword').value = '';
                        document.getElementById('registerConfirmPassword').value = '';
                        switchTab('login');
                    }, 2000);
                } else {
                    const error = await response.json();
                    showAlert('registerAlert', error.detail || 'Ошибка регистрации', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('registerAlert', 'Ошибка подключения к серверу', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Регистрация';
            }
        }
        
        function showAlert(alertId, message, type) {
            const alert = document.getElementById(alertId);
            alert.textContent = message;
            alert.classList.remove('alert-error', 'alert-success');
            alert.classList.add(`alert-${type}`, 'show');
            
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }
        
        // Check if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
